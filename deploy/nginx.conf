# ── Admin + API (qrcode-portal.site) ─────────────────────────────────────────
server {
    server_name qrcode-portal.site www.qrcode-portal.site;
    listen 443 ssl;
    ssl_certificate     cert/www.qrcode-portal.site.pem;
    ssl_certificate_key cert/www.qrcode-portal.site.key;
    ssl_session_timeout 5m;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Admin static files
    location / {
        root /srv/certstar/packages/admin/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 80;
    server_name qrcode-portal.site www.qrcode-portal.site;
    rewrite ^(.*)$ https://$host$1 permanent;
}

